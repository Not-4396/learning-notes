<!DOCTYPE html>
<html lang="zh-CN" style="font-size:14px">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4A90D9" />
    <title>学习笔记 v3</title>
    <script>
      // Real responsive: scale base font-size continuously based on viewport width.
      // Design reference: 375px → 16px. Clamps between 13px and 20px.
      (function(){
        var w = window.innerWidth || document.documentElement.clientWidth || 375;
        var fs = Math.min(Math.max(w / 375 * 16, 13), 20);
        document.documentElement.style.fontSize = Math.round(fs * 10) / 10 + 'px';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
